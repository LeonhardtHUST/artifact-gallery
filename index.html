<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leon 的 AI Artifacts</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #111111;
      --muted: #8a8a8a;
      --border: #d6d6d6;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(940px, calc(100% - 64px));
      margin: 0 auto;
      padding: 72px 0 88px;
    }

    h1 {
      margin: 0 0 42px;
      color: var(--text);
      font-size: 2.375rem;
      line-height: 1.16;
      font-weight: 800;
      letter-spacing: 0;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 22px;
      align-items: stretch;
    }

    .card {
      display: flex;
      flex-direction: column;
      width: 260px;
      min-height: 356px;
      overflow: hidden;
      color: inherit;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px);
      border-color: #c5c5c5;
      box-shadow: var(--shadow);
      outline: none;
    }

    .image-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f0f0f0;
      flex: 0 0 auto;
    }

    .image-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
    }

    .title-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-start;
      min-width: 0;
    }

    .entry-title {
      min-width: 0;
      margin: 0;
      color: var(--text);
      font-size: 1.125rem;
      line-height: 1.28;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .date {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.35;
      white-space: normal;
    }

    .description {
      margin: 0;
      color: var(--text);
      font-size: 0.9375rem;
      line-height: 1.55;
      font-weight: 400;
      overflow-wrap: anywhere;
    }

    .empty,
    .error {
      width: 100%;
      padding: 18px 0;
      color: var(--muted);
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 48px, 520px);
        padding: 48px 0 60px;
      }

      h1 {
        margin-bottom: 32px;
        font-size: 1.875rem;
      }

      .gallery {
        flex-direction: column;
        gap: 14px;
      }

      .card {
        flex-direction: row;
        width: 100%;
        min-height: 130px;
        border-radius: 16px;
      }

      .image-wrap {
        width: 128px;
        height: 128px;
        aspect-ratio: auto;
      }

      .content {
        min-width: 0;
        padding: 14px;
      }
    }

    @media (max-width: 380px) {
      .image-wrap {
        width: 104px;
        height: 104px;
      }

      .entry-title {
        font-size: 1rem;
      }

      .description {
        font-size: 0.875rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 id="page-title">Leon 的 AI Artifacts</h1>
    <section class="gallery" id="gallery" aria-label="AI Artifact Gallery"></section>
  </main>

  <script>
    const locale = navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh" : "en";
    const text = {
      zh: {
        title: "Leon 的 AI Artifacts",
        empty: "暂无产物。",
        error: "无法加载 list.json。"
      },
      en: {
        title: "Leon's AI Artifact Gallery",
        empty: "No artifacts yet.",
        error: "Could not load list.json."
      }
    };

    const pageTitle = document.getElementById("page-title");
    const gallery = document.getElementById("gallery");

    document.documentElement.lang = locale === "zh" ? "zh-CN" : "en";
    document.title = text[locale].title;
    pageTitle.textContent = text[locale].title;

    function localized(value) {
      if (!value || typeof value === "string") {
        return value || "";
      }

      return value[locale] || value.en || value.zh || "";
    }

    function render(entries) {
      gallery.innerHTML = "";

      if (!Array.isArray(entries) || entries.length === 0) {
        gallery.innerHTML = `<p class="empty">${text[locale].empty}</p>`;
        return;
      }

      const fragment = document.createDocumentFragment();

      entries.forEach((entry) => {
        const card = document.createElement("a");
        card.className = "card";
        card.href = entry.url || "#";
        card.setAttribute("aria-label", localized(entry.title));

        const imageWrap = document.createElement("div");
        imageWrap.className = "image-wrap";

        const image = document.createElement("img");
        image.src = entry.imageUrl || "";
        image.alt = localized(entry.title);
        image.loading = "lazy";
        image.decoding = "async";
        imageWrap.appendChild(image);

        const content = document.createElement("div");
        content.className = "content";

        const titleRow = document.createElement("div");
        titleRow.className = "title-row";

        const title = document.createElement("h2");
        title.className = "entry-title";
        title.textContent = localized(entry.title);

        const date = document.createElement("time");
        date.className = "date";
        date.dateTime = entry.generatedAt || "";
        date.textContent = entry.generatedAt || "";

        const description = document.createElement("p");
        description.className = "description";
        description.textContent = localized(entry.description);

        titleRow.append(title, date);
        content.append(titleRow, description);
        card.append(imageWrap, content);
        fragment.appendChild(card);
      });

      gallery.appendChild(fragment);
    }

    fetch("list.json", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        return response.json();
      })
      .then(render)
      .catch(() => {
        gallery.innerHTML = `<p class="error">${text[locale].error}</p>`;
      });
  </script>
</body>
</html>
